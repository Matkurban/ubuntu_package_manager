name: package-manager
version: "1.0.0"
title: Package Manager
summary: Package Manager
description: |
  Manage APT and Snap packages, install .deb files, and organize AppImages on Ubuntu.
license: MIT
contact: k3496354336@qq.com
website: https://github.com/Matkurban/ubuntu_package_manager
source-code: https://github.com/Matkurban/ubuntu_package_manager

confinement: classic
base: core22
grade: stable

environment:
  SNAP_DESKTOP_RUNTIME: /snap/gnome-42-2204/current
  GTK_USE_PORTAL: "1"

apps:
  package-manager:
    command: package_manager
    command-chain:
      - snap/command-chain/desktop-launch
    environment:
      DISABLE_ATK_BRIDGE: "1"

parts:
  package-manager:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart
    build-packages:
      - clang
      - cmake
      - ninja-build
      - pkg-config
      - libgtk-3-dev
      - liblzma-dev
      - libstdc++-12-dev
      - libblkid-dev
    build-environment:
      - SNAPCRAFT_GNOME_SDK: /snap/gnome-42-2204-sdk/current/
      - PATH: /snap/gnome-42-2204-sdk/current/usr/bin${PATH:+:$PATH}
      - XDG_DATA_DIRS: $CRAFT_STAGE/usr/share:/snap/gnome-42-2204-sdk/current/usr/share:/usr/share${XDG_DATA_DIRS:+:$XDG_DATA_DIRS}
      - LD_LIBRARY_PATH: /snap/gnome-42-2204-sdk/current/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/snap/gnome-42-2204-sdk/current/usr/lib:/snap/gnome-42-2204-sdk/current/usr/lib/vala-current:/snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pulseaudio${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
      - PKG_CONFIG_PATH: /snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig:/snap/gnome-42-2204-sdk/current/usr/lib/pkgconfig:/snap/gnome-42-2204-sdk/current/usr/share/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}
      - GETTEXTDATADIRS: /snap/gnome-42-2204-sdk/current/usr/share/gettext-current${GETTEXTDATADIRS:+:$GETTEXTDATADIRS}
      - GDK_PIXBUF_MODULE_FILE: /snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gdk-pixbuf-current/loaders.cache
      - ACLOCAL_PATH: /snap/gnome-42-2204-sdk/current/usr/share/aclocal${ACLOCAL_PATH:+:$ACLOCAL_PATH}
      - PYTHONPATH: /snap/gnome-42-2204-sdk/current/usr/lib/python3.10:/snap/gnome-42-2204-sdk/current/usr/lib/python3/dist-packages:/snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gobject-introspection${PYTHONPATH:+:$PYTHONPATH}
      - GI_TYPELIB_PATH: /snap/gnome-42-2204-sdk/current/usr/lib/girepository-1.0:/snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/girepository-1.0${GI_TYPELIB_PATH:+:$GI_TYPELIB_PATH}
      - CMAKE_PREFIX_PATH: $CRAFT_STAGE/usr:/snap/gnome-42-2204-sdk/current/usr${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}
    prime:
      - -usr/lib/*/dri
      - -usr/lib/*/libEGL*
      - -usr/lib/*/libGL*
      - -usr/lib/*/libGLES*
      - -usr/lib/*/libgbm*
      - -usr/lib/*/libglapi*
      - -usr/lib/*/libdrm*
      - -usr/lib/*/libvulkan*
    override-pull: |
      craftctl default
      rm -rf \
        .dart_tool \
        build \
        .flutter-plugins-dependencies \
        linux/flutter/ephemeral \
        ios/Flutter/ephemeral \
        macos/Flutter/ephemeral \
        windows/flutter/ephemeral
    override-build: |
      set -eux
      FLUTTER_DIR="${CRAFT_PART_BUILD}/flutter-distro"
      if [ ! -x "${FLUTTER_DIR}/bin/flutter" ]; then
        rm -rf "${FLUTTER_DIR}"
        FLUTTER_ARCHIVE="flutter_linux_3.44.1-stable.tar.xz"
        curl -fL --retry 5 --retry-delay 3 \
          "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/${FLUTTER_ARCHIVE}" \
          -o "${CRAFT_PART_BUILD}/${FLUTTER_ARCHIVE}"
        tar xf "${CRAFT_PART_BUILD}/${FLUTTER_ARCHIVE}" -C "${CRAFT_PART_BUILD}"
        mv "${CRAFT_PART_BUILD}/flutter" "${FLUTTER_DIR}"
        rm -f "${CRAFT_PART_BUILD}/${FLUTTER_ARCHIVE}"
      fi
      git config --global --add safe.directory "${FLUTTER_DIR}"
      export PATH="${FLUTTER_DIR}/bin:$PATH"
      flutter precache --linux
      flutter pub get
      flutter build linux --release --verbose --target lib/main.dart
      cp -a build/linux/*/release/bundle/. "${CRAFT_PART_INSTALL}/"
    override-prime: |
      craftctl default
      rm -f "${CRAFT_PRIME}/ubuntu_package_manager"
      LIBDIR="${CRAFT_PRIME}/usr/lib/x86_64-linux-gnu"
      if [ -d "${LIBDIR}" ]; then
        for subdir in blas lapack pulseaudio mfx vdpau; do
          if [ -d "${LIBDIR}/${subdir}" ]; then
            for lib in "${LIBDIR}/${subdir}"/*.so*; do
              [ -f "${lib}" ] || continue
              name=$(basename "${lib}")
              ln -sf "${subdir}/${name}" "${LIBDIR}/${name}"
            done
          fi
        done
      fi
      if [ -d "${CRAFT_PRIME}/usr/lib" ]; then
        rm -rf "${CRAFT_PRIME}/usr/lib/"*/dri
        find "${CRAFT_PRIME}/usr/lib" -name 'libEGL*' -delete
        find "${CRAFT_PRIME}/usr/lib" -name 'libGL*' -delete
      fi

  cleanup:
    after: [package-manager]
    plugin: nil
    build-snaps:
      - core22
      - gnome-42-2204
    build-environment:
      - SNAPCRAFT_GNOME_SDK: /snap/gnome-42-2204-sdk/current/
      - PATH: /snap/gnome-42-2204-sdk/current/usr/bin${PATH:+:$PATH}
      - XDG_DATA_DIRS: $CRAFT_STAGE/usr/share:/snap/gnome-42-2204-sdk/current/usr/share:/usr/share${XDG_DATA_DIRS:+:$XDG_DATA_DIRS}
      - LD_LIBRARY_PATH: /snap/gnome-42-2204-sdk/current/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/snap/gnome-42-2204-sdk/current/usr/lib:/snap/gnome-42-2204-sdk/current/usr/lib/vala-current:/snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pulseaudio${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
      - PKG_CONFIG_PATH: /snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig:/snap/gnome-42-2204-sdk/current/usr/lib/pkgconfig:/snap/gnome-42-2204-sdk/current/usr/share/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}
      - GETTEXTDATADIRS: /snap/gnome-42-2204-sdk/current/usr/share/gettext-current${GETTEXTDATADIRS:+:$GETTEXTDATADIRS}
      - GDK_PIXBUF_MODULE_FILE: /snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gdk-pixbuf-current/loaders.cache
      - ACLOCAL_PATH: /snap/gnome-42-2204-sdk/current/usr/share/aclocal${ACLOCAL_PATH:+:$ACLOCAL_PATH}
      - PYTHONPATH: /snap/gnome-42-2204-sdk/current/usr/lib/python3.10:/snap/gnome-42-2204-sdk/current/usr/lib/python3/dist-packages:/snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/gobject-introspection${PYTHONPATH:+:$PYTHONPATH}
      - GI_TYPELIB_PATH: /snap/gnome-42-2204-sdk/current/usr/lib/girepository-1.0:/snap/gnome-42-2204-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/girepository-1.0${GI_TYPELIB_PATH:+:$GI_TYPELIB_PATH}
      - CMAKE_PREFIX_PATH: $CRAFT_STAGE/usr:/snap/gnome-42-2204-sdk/current/usr${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}
    override-prime: |
      set -eu
      for snap in "core22" "gnome-42-2204"; do
        cd "/snap/$snap/current" && find . -type f,l -exec rm -f "${CRAFT_PRIME}/{}" \;
      done

  gnome/sdk:
    source: /snap/snapcraft/current/share/snapcraft/extensions/desktop/command-chain
    plugin: make
    build-snaps:
      - gnome-42-2204-sdk

  launcher:
    after: [package-manager, gnome/sdk, cleanup]
    plugin: nil
    override-prime: |
      install -D -m755 "${CRAFT_PROJECT_DIR}/snap/local/desktop-launch" "${CRAFT_PRIME}/snap/command-chain/desktop-launch"
